<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJ Burger</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#D4A017;
  --dark:#0A0A0A;
  --card:#111;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--dark);
  color:white;
  font-family:'Tajawal',sans-serif;
}

/* HEADER */
header{
  text-align:center;
  padding:30px 20px;
  font-size:28px;
  font-weight:900;
  color:var(--gold);
}

/* GRID */
.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}

/* CARD */
.item{
  background:var(--card);
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.item img{
  width:100%;
  height:130px;
  object-fit:cover;
}

.item-body{
  padding:10px;
}

.item h3{
  font-size:15px;
  margin-bottom:5px;
}

.price{
  color:var(--gold);
  font-weight:bold;
}

button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--gold);
  font-weight:bold;
  cursor:pointer;
}

/* CART BUTTON */
.cart{
  position:fixed;
  bottom:20px;
  left:20px;
  background:var(--gold);
  color:black;
  padding:12px 18px;
  border-radius:50px;
  font-weight:bold;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111;
  padding:20px;
  border-radius:20px 20px 0 0;
  display:none;
}

.modal.open{display:block}

input{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

.send{
  background:#25D366;
  color:white;
}
</style>
</head>

<body>

<header>🍔 MJ BURGER</header>

<div class="menu">

  <div class="item">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
    <div class="item-body">
      <h3>Classic Burger</h3>
      <div class="price">200 DA</div>
      <button onclick="add('Classic Burger',200)">أضف</button>
    </div>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1553979459-d2229ba7433b">
    <div class="item-body">
      <h3>Cheese Burger</h3>
      <div class="price">250 DA</div>
      <button onclick="add('Cheese Burger',250)">أضف</button>
    </div>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5">
    <div class="item-body">
      <h3>Double Burger</h3>
      <div class="price">300 DA</div>
      <button onclick="add('Double Burger',300)">أضف</button>
    </div>
  </div>

</div>

<div class="cart" onclick="openCart()">🛒 عرض الطلب (<span id="count">0</span>)</div>

<div class="modal" id="modal">
  <h3>📋 الطلب</h3>
  <div id="items"></div>
  <input id="name" placeholder="اسمك">
  <input id="phone" placeholder="رقم الهاتف">
  <input id="address" placeholder="العنوان">
  <button class="send" onclick="send()">إرسال عبر واتساب</button>
</div>

<script>
let cart=[];

function add(name,price){
  cart.push({name,price});
  document.getElementById('count').innerText=cart.length;
}

function openCart(){
  document.getElementById('modal').classList.add('open');
  let html='';
  cart.forEach(i=>{
    html+= i.name + ' - ' + i.price + ' DA<br>';
  });
  document.getElementById('items').innerHTML=html;
}

function send(){
  let name=document.getElementById('name').value;
  let phone=document.getElementById('phone').value;
  let address=document.getElementById('address').value;

  let text="طلب جديد:%0A";
  cart.forEach(i=>{
    text+=i.name+" - "+i.price+" DA%0A";
  });

  text+="%0Aالاسم: "+name;
  text+="%0Aالهاتف: "+phone;
  text+="%0Aالعنوان: "+address;

  window.open("https://wa.me/213XXXXXXXXX?text="+text);
}
</script>

</body>
</html>
